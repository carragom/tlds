name: CI

on:
   push:
      branches: [main]
   pull_request:
      branches: [main]

permissions:
   contents: read

concurrency:
   group: ci-${{ github.workflow }}-${{ github.ref }}
   cancel-in-progress: true

jobs:
   ci:
      runs-on: ubuntu-latest
      steps:
         - name: Checkout repository
           uses: actions/checkout@v6

         - name: Setup Deno
           uses: denoland/setup-deno@v2
           with:
              cache: true

         - name: Check formatting
           run: deno fmt --check

         - name: Lint
           run: deno lint

         - name: Test
           run: deno task test
